<style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; font-size: 13px;
               background: #fff; padding: 10px; }
        #chart-container { width: 100%; height: 520px; }
      </style>
<div id="chart-container"></div>
<script>
        const COLOR   = "#E72F72";
        const allData = [{"categories":["Ukraina","Syria","Polen","Frankrike","Tyrkia","Filippinene ","USA","Tyskland","Russland","Iran"],"values":[550,363,226,212,208,182,182,164,161,149],"seriesName":"Antall søkere","decimals":0}];
        let chart = null;

        
    function renderChart(index) {
      const d = allData[index];
      if (!d) return;
      if (chart) { chart.destroy(); }

      chart = Highcharts.chart("chart-container", {
        chart: {
          type: "bar",
          reflow: true,
          margin: [20, 60, 40, 180]
        },
        title:    { text: "Søkere med utenlandsk utdanningsbakgrunn" },
        subtitle: { text: "" },
        xAxis: {
          categories: d.categories,
          title: { text: "" },
          labels: { style: { fontSize: "11px" } }
        },
        yAxis: {
          min: 0,
          title: { text: "" },
          labels: {
            formatter: function() {
              return Highcharts.numberFormat(this.value, d.decimals, ",", " ");
            }
          }
        },
        legend: {
          enabled: true,
          align: "center",
          verticalAlign: "bottom",
          layout: "horizontal",
          y: 20,
          itemStyle: { fontSize: "11px", fontWeight: "normal" }
        },
        tooltip: {
          formatter: function() {
            return "<b>" + this.x + "</b><br/>" + d.seriesName + ": " +
                   Highcharts.numberFormat(this.y, d.decimals, ",", " ");
          }
        },
        plotOptions: {
          bar: {
            
            pointPadding: 0.01,
            colorByPoint: false,
            dataLabels: { enabled: false },
            label:       { enabled: false }
          }
        },
        series: [{
          name:  d.seriesName,
          data:  d.values,
          color: COLOR
        }],
        credits: { enabled: false },
        exporting: {
          enabled: true,
          csv: {
            columnHeaderFormatter: function(item, key) {
              if (!item || item.isXAxis) { return "Land"; }
              return item.name;
            }
          }
        }
      });
    }
  

        renderChart(0);
      </script>
</body>
