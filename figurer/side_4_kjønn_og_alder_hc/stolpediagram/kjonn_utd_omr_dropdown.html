      const select = document.getElementById("grp-select");
      let chart = null;

      allData.forEach(function(d, i) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = d.label;
        select.appendChild(opt);
      });

      function renderChart(index) {
        const d = allData[index];
        if (!d) { console.log("No data for index", index); return; }
        if (chart) { chart.destroy(); }

        const series = d.series.map(function(s) {
          console.log("Building series:", s.name, "data length:", s.data.length);
          return {
            name:  s.name,
            color: COLORS[s.name] || undefined,
            data:  s.data.map(function(val, i) {
              return {
                y:     val,
                pct:   s.pcts[i],
                label: s.labels[i]
              };
            })
          };
        });

        console.log("Calling Highcharts.chart, series:", series.length);
        try {
          chart = Highcharts.chart("chart-container", {
            chart: { type: CHART_TYPE, height: CHART_HEIGHT, reflow: true },
            title: { text: "" },
            xAxis: {
              categories: d.categories,
              title: { text: "" },
              labels: {
                rotation: (CHART_TYPE === "column" && d.categories.length > 6) ? -35 : 0,
                style: { fontSize: "11px" }
              }
            },
            yAxis: {
              min: 0, max: 100,
              title: { text: "" },
              labels: { format: "{value}%" },
              reversedStacks: false
            },
            tooltip: {
              useHTML: true,
              formatter: function() {
                return "aar: " + this.x +
                       "<br>kjonn: " + this.series.name +
                       "<br>Antall / andel: " + this.point.label;
              }
            },
            plotOptions: {
              series: {
                stacking: "percent",
                borderWidth: 0,
                dataLabels: {
                  enabled: true,
                  crop: false,
                  overflow: "none",
                  style: {
                    color: "white",
                    fontWeight: "normal",
                    textOutline: "none",
                    fontSize: LABEL_FONT_SIZE
                  },
                  formatter: function() {
                    if (this.percentage < LABEL_THRESHOLD) return null;
                    return Highcharts.numberFormat(this.percentage, 1, ",", " ") + " %";
                  }
                }
              },
              bar:    { pointWidth: BAR_WIDTH, pointPadding: 0.05, groupPadding: 0.08 },
              column: { pointWidth: BAR_WIDTH, pointPadding: 0.05, groupPadding: 0.08 }
            },
            legend: {
              layout: "horizontal", align: "center", verticalAlign: "bottom",
              itemStyle: { fontSize: "11px", fontWeight: "normal" }
            },
            credits: { enabled: false },
            exporting: { enabled: true }
          });
          console.log("Highcharts.chart call succeeded");
        } catch(e) {
          console.error("Highcharts.chart error:", e);
        }
      }

        renderChart(parseInt(this.value));
      });
