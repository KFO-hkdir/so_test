<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 13px; background: #fff; padding: 10px; }
    #chart-container { width: 100%; height: 520px; }
  </style>
<div id="chart-container"></div>
<script>
    const chartData = {"categories":["Helsefag","Økonomisk-administrative fag","Lærerutdanninger","Teknologiske fag","Samfunnsfag","Informasjonsteknologi","Historiefag","Språkfag","Realfag","Juridiske fag","Estetiske fag","Idrettsfag","Mediefag","Pedagogiske fag","Land- og havbruk","Reiselivsfag"],"values":[12426,10248,7389,6954,6312,3108,3071,2978,2395,2150,1616,1607,1587,1571,900,230]};

    Highcharts.chart("chart-container", {
      chart: {
        type: "bar",
        reflow: true,
        margin: [20, 60, 40, 180]
      },
      title:    { text: "" },
      subtitle: { text: "" },
      xAxis: {
        categories: chartData.categories,
        title: { text: "" },
        labels: { style: { fontSize: "11px" } }
      },
      yAxis: {
        min: 0,
        title: { text: "" },
        labels: {
          formatter: function() {
            return Highcharts.numberFormat(this.value, 0, ",", " ");
          }
        }
      },
      legend:   { enabled: false },
      tooltip: {
        formatter: function() {
          return "<b>" + this.x + "</b><br/>Studieplasser: " +
                 Highcharts.numberFormat(this.y, 0, ",", " ");
        }
      },
      plotOptions: {
        bar: {
          colorByPoint: false,
          dataLabels: { enabled: false },
          label:       { enabled: false }
        }
      },
      series: [{
        name:  "Studieplasser",
        data:  chartData.values,
        color: "#E72F72"
      }],
      credits:   { enabled: false },
      exporting: {
        enabled: true,
        csv: {
          columnHeaderFormatter: function(item, key) {
            if (!item || item.isXAxis) { return "Utdanningsområde"; }
            return item.name;
          }
        }
      }
    });
  </script>
</body>
