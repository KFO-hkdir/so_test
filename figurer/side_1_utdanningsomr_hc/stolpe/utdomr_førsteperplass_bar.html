<style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; font-size: 13px;
               background: #fff; padding: 10px; }
        #chart-container { width: 100%; height: 520px; }
      </style>
<div id="chart-container"></div>
<script>
        const COLOR   = "#E72F72";
        const allData = [{"categories":["Juridiske fag","Helsefag","Samfunnsfag","Mediefag","Økonomisk-administrative fag","Teknologiske fag","Idrettsfag","Informasjonsteknologi","Reiselivsfag","Estetiske fag","Realfag","Språkfag","Pedagogiske fag","Historiefag","Land- og havbruk","Lærerutdanninger"],"values":[4.7,2.8,2.6,2.5,2.5,2.1,1.8,1.8,1.8,1.7,1.6,1.6,1.4,1.2,1.2,1.1],"seriesName":"Førstevalg per plass","decimals":1}];
        let chart = null;

        
    function renderChart(index) {
      const d = allData[index];
      if (!d) return;
      if (chart) { chart.destroy(); }

      chart = Highcharts.chart("chart-container", {
        chart: {
          type: "bar",
          reflow: true,
          margin: [20, 60, 40, 180]
        },
        title:    { text: "" },
        subtitle: { text: "" },
        xAxis: {
          categories: d.categories,
          title: { text: "" },
          labels: { style: { fontSize: "11px" } }
        },
        yAxis: {
          min: 0,
          title: { text: "" },
          labels: {
            formatter: function() {
              return Highcharts.numberFormat(this.value, d.decimals, ",", " ");
            }
          }
        },
        legend: { enabled: false },
        tooltip: {
          formatter: function() {
            return "<b>" + this.x + "</b><br/>" + d.seriesName + ": " +
                   Highcharts.numberFormat(this.y, d.decimals, ",", " ");
          }
        },
        plotOptions: {
          bar: {
            
            pointPadding: 0.01,
            colorByPoint: false,
            dataLabels: { enabled: false },
            label:       { enabled: false }
          }
        },
        series: [{
          name:  d.seriesName,
          data:  d.values,
          color: COLOR
        }],
        credits: { enabled: false },
        exporting: {
          enabled: true,
          csv: {
            columnHeaderFormatter: function(item, key) {
              if (!item || item.isXAxis) { return "utd_omr"; }
              return item.name;
            }
          }
        }
      });
    }
  

        renderChart(0);
      </script>
</body>
