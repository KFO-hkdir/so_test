<body>
<style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; font-size: 13px;
             background: #fff; padding: 10px; }
      #controls { margin-bottom: 12px; }
      #controls label { font-weight: bold; margin-right: 8px; }
      #grp-select {
        padding: 5px 10px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
        min-width: 220px;
        cursor: pointer;
      }
      #chart-container { width: 100%; height: 420px; }
    </style>
<div id="controls">
  <label for="grp-select">Utdanningstype:</label>
  <select id="grp-select"></select>
</div>
<div id="chart-container"></div>
<script>
      const COLORS        = ["#E72F72","#0025A0"];
      const MARKER_RADIUS = 4;
      const allData       = [{"label":"Arkitekt","categories":["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025"],"n_sokere":[1233,1224,1320,1293,1374,1498,1672,1488,1550,1231,1021],"antall_studieplasser":[140,140,140,140,140,140,160,160,140,144,153]},{"label":"Ingeniør","categories":["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025"],"n_sokere":[5762,5567,5151,5247,5101,5439,5541,5373,5185,5923,5876],"antall_studieplasser":[3067,3390,3423,3763,3691,3388,3451,3428,3467,3573,3600]},{"label":"Maritime","categories":["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025"],"n_sokere":[461,384,448,482,631,662,882,884,1020,983,1097],"antall_studieplasser":[168,158,203,218,230,238,230,230,232,245,275]},{"label":"Sivilingeniør","categories":["2015","2016","2017","2018","2019","2020","2021","2022","2023","2024","2025"],"n_sokere":[5325,4892,4912,5269,5377,5622,5739,5262,5820,5948,5683],"antall_studieplasser":[1807,1853,2074,2096,2115,2100,2378,2317,2191,2431,2433]}];

      const select = document.getElementById("grp-select");
      let chart = null;

      allData.forEach(function(d, i) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = d.label;
        select.appendChild(opt);
      });

      function renderChart(index) {
        const d = allData[index];
        if (!d) return;
        if (chart) { chart.destroy(); }

        chart = Highcharts.chart("chart-container", {
          chart: {
            type: "line",
            reflow: true,
            margin: [50, 20, 60, 80]
          },
          title:    { text: "" },
          subtitle: { text: "" },
          xAxis: {
            categories: d.categories,
            title: { text: "" }
          },
          yAxis: {
            min: 0,
            max: null,
            title: { text: "" },
            labels: {
              formatter: function() {
                return Highcharts.numberFormat(this.value, 0, ",", " ");
              }
            }
          },
          legend: {
            enabled: true,
            align: "center",
            verticalAlign: "bottom",
            layout: "horizontal",
            itemStyle: { fontSize: "11px", fontWeight: "normal" }
          },
          tooltip: { shared: true, formatter: function() {  var s = "<b>" + this.x + "</b>";  this.points.forEach(function(p) {    s += "<br/>" + p.series.name + ": " +         Highcharts.numberFormat(p.y, 0, ",", " ");  });  return s;} },
          plotOptions: { line: { lineWidth: 1.5 } },
          series: [
            { name: "Søkere", data: d["n_sokere"], color: COLORS[0], marker: { enabled: true, radius: MARKER_RADIUS }, dataLabels: { enabled: false }, label: { enabled: false } },
          { name: "Studieplasser", data: d["antall_studieplasser"], color: COLORS[1], marker: { enabled: true, radius: MARKER_RADIUS }, dataLabels: { enabled: false }, label: { enabled: false } }
          ],
          credits: { enabled: false },
          exporting: { enabled: true }
        });
      }

      select.addEventListener("change", function() {
        renderChart(parseInt(this.value));
      });

      renderChart(0);
    </script>
</body>
</html>
