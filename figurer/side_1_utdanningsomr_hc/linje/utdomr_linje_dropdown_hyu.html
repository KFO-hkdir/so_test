<style>* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 13px; background: #fff; padding: 10px; }
#controls { margin-bottom: 12px; }
#controls label { font-weight: bold; margin-right: 8px; }
#grp-select { padding: 5px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; min-width: 220px; cursor: pointer; }
#chart-container { width: 100%; height: 420px; }</style>
<div id="controls">
  <label for="grp-select">Utdanningsområde:</label>
  <select id="grp-select"></select>
</div>
<div id="chart-container"></div>
<script>const allData = [{"label":"Estetiske fag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[289,382,358,272,454,273],"antall_studieplasser":[162,207,250,217,288,195]},{"label":"Helsefag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[2130,3323,2682,2824,3145,2779],"antall_studieplasser":[2196,4006,3143,3226,3978,3245]},{"label":"Informasjonsteknologi","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[398,608,591,728,811,1020],"antall_studieplasser":[406,560,611,626,614,829]},{"label":"Land- og havbruk","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[302,368,411,255,292,144],"antall_studieplasser":[225,335,453,240,377,154]},{"label":"Matfag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[138,166,220,154,156,160],"antall_studieplasser":[165,199,250,240,175,161]},{"label":"Mediefag","categories":["2021","2022","2023","2024","2025"],"n_sokere":[34,76,63,66,127],"antall_studieplasser":[30,70,70,50,60]},{"label":"Pedagogiske fag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[107,230,227,209,282,269],"antall_studieplasser":[155,405,355,305,483,330]},{"label":"Reiseliv","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[116,119,113,55,34,72],"antall_studieplasser":[265,290,284,175,95,180]},{"label":"Teknologiske fag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[5679,6559,6637,7844,9221,9046],"antall_studieplasser":[5063,5844,5840,6577,6585,6878]},{"label":"Økonomisk-administrative fag","categories":["2020","2021","2022","2023","2024","2025"],"n_sokere":[160,1017,931,1049,1281,1306],"antall_studieplasser":[180,1185,930,1110,1642,1337]}];
const select  = document.getElementById("grp-select");
let chart = null;

allData.forEach(function(d, i) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = d.label;
  select.appendChild(opt);
});

function renderChart(index) {
  const d = allData[index];
  if (!d) return;
  if (chart) { chart.destroy(); }

  chart = Highcharts.chart("chart-container", {
    chart: { type: "line", reflow: true, margin: [50, 20, 60, 80] },
    title: { text: "" },
    xAxis: { categories: d.categories, title: { text: "" } },
    yAxis: {
      min: 0, max: null,
      title: { text: "" },
      labels: { formatter: function() {
        return Highcharts.numberFormat(this.value, 0, ",", " ");
      }}
    },
    legend: {
      enabled: true,
      align: "center", verticalAlign: "bottom", layout: "horizontal",
      itemStyle: { fontSize: "11px", fontWeight: "normal" }
    },
    tooltip: { shared: true, formatter: function() {  var s = "<b>" + this.x + "</b>";  this.points.forEach(function(p) {    s += "<br/>" + p.series.name + ": " +         Highcharts.numberFormat(p.y, 0, ",", " ");  });  return s;} },
    plotOptions: { line: { lineWidth: 1.5 } },
    series: [
    { name: "Søkere", data: d["n_sokere"], color: "#E72F72", marker: { enabled: true, radius: 4 }, dataLabels: { enabled: false }, label: { enabled: false } },
      { name: "Studieplasser", data: d["antall_studieplasser"], color: "#0025A0", marker: { enabled: true, radius: 4 }, dataLabels: { enabled: false }, label: { enabled: false } }
    ],
    credits: { enabled: false },
    exporting: { enabled: true }
  });
}

select.addEventListener("change", function() {
  renderChart(parseInt(this.value));
});

renderChart(0);</script>
</body>
