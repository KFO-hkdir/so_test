  <style>
        /* ── Page layout ── */
        html, body {
          height: 100%;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: sans-serif;
          max-width: 1200px;
          margin: 16px auto;
          padding: 0 16px;
          font-size: 11px;
          box-sizing: border-box;
        }

        h4 {
          font-size: 13px;
          margin: 0 0 12px 0;
          line-height: 1.25;
        }

        /* ── Controls row ── */
        .hc-table-controls {
          display: flex;
          align-items: center;
          gap: 6px;
          margin-bottom: 10px;
          width: 100%;
          box-sizing: border-box;
        }
        .hc-table-select-wrap { flex: 1 1 auto; min-width: 0; }
        .hc-table-select-wrap select {
          font-size: 11px;
          padding: 4px 7px;
          border: 1px solid #ccc;
          border-radius: 4px;
          width: 100%;
          box-sizing: border-box;
          background: white;
        }
        .hc-table-export-wrap { flex: 0 0 auto; }

        /* ── Column filter row ── */
        .hc-filter-row {
          display: flex;
          gap: 4px;
          margin-bottom: 8px;
          flex-wrap: nowrap;
          overflow-x: auto;
        }
        .hc-filter-row input.hc-col-filter {
          flex: 1 1 0;
          min-width: 60px;
          font-size: 11px;
          padding: 4px 6px;
          border: 1px solid #ccc;
          border-radius: 3px;
          box-sizing: border-box;
          background: #fafafa;
        }
        .hc-filter-row input.hc-col-filter:focus {
          outline: none;
          border-color: #F58220;
          background: #fff;
        }

        /* ── Export burger ── */
        .hc-export-wrap { position: relative; display: inline-block; }
        .hc-export-btn {
          width: 26px; height: 26px;
          border: 1px solid #ccc; border-radius: 4px;
          background: white; cursor: pointer;
          font-size: 11px; line-height: 1; padding: 0;
        }
        .hc-export-btn:hover { background: #f6f6f6; }
        .hc-export-menu {
          display: none; position: absolute; right: 0;
          top: calc(100% + 4px); min-width: 140px;
          background: white; border: 1px solid #ccc;
          border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
          z-index: 9999; overflow: hidden;
        }
        .hc-export-menu.open { display: block; }
        .hc-export-item {
          display: block; width: 100%; border: 0; background: white;
          text-align: left; padding: 8px 10px; cursor: pointer; font-size: 11px;
        }
        .hc-export-item:hover { background: #f6f6f6; }

        /* ── Grid container ── */
        /* ── Grid container ── */
        #datagrid-container { width: 100%; }
        .hcg-container      { width: 100% !important; }

        /* ── Grid Lite CSS-variable theme ── */
        .hcg-custom-theme {
          --hcg-font-size:          11px;
          --hcg-font-family:        sans-serif;
          --hcg-padding:            3px 6px;
          --hcg-header-background:  #F58220;
          --hcg-header-color:       #ffffff;
          --hcg-header-font-size:   11px;
          --hcg-header-font-weight: bold;
          --hcg-header-padding:     3px 6px;
          --hcg-row-odd-background:  #ffffff;
          --hcg-row-even-background: #fde9d9;
          width: 100% !important;
        }
        .hcg-custom-theme th {
          padding-left: 14px !important;
          padding-right: 14px !important;
        }
        /* Right-align numeric columns (all except first) */
        .hcg-custom-theme th:not(:first-child),
        .hcg-custom-theme td:not(:first-child) {
          text-align: right !important;
          white-space: nowrap;
        }
        .hcg-custom-theme th:first-child,
        .hcg-custom-theme td:first-child {
          text-align: left !important;
          white-space: nowrap;
        }
        .hcg-custom-theme th:not(:first-child) > *,
        .hcg-custom-theme th:not(:first-child) button,
        .hcg-custom-theme th:not(:first-child) span {
          text-align: right !important;
          justify-content: flex-end !important;
        }

        #datagrid-container { height: 600px !important; }
        
      </style>

      let grid = null;
      
    function renderTable(key) {
      const rawRows = allData[key] || [];
      const filteredRows = (typeof applyFilters === 'function') ? applyFilters(rawRows) : rawRows;
      const cols = {
        'col_1': filteredRows.map(r => r['Institusjon']),
            'col_2': filteredRows.map(r => r['Studiekode']),
            'col_3': filteredRows.map(r => r['Studienavn']),
            'col_4': filteredRows.map(r => r['Studiested']),
            'col_5': filteredRows.map(r => r['Utdanningstype']),
            'col_6': filteredRows.map(r => r['Søkere']),
            'col_7': filteredRows.map(r => r['Førstevalgs- søkere']),
            'col_8': filteredRows.map(r => r['Studieplasser'])
      };

      if (grid) {
        grid.update({
          dataTable: { columns: cols }
        });
      } else {
        grid = Grid.grid('datagrid-container', {
          dataTable: { columns: cols },
          columnDefaults: { resizable: true },
          columns: [
            { id: 'col_1', header: { format: 'Institusjon' } },
                  { id: 'col_2', header: { format: 'Studiekode' } },
                  { id: 'col_3', header: { format: 'Studienavn' } },
                  { id: 'col_4', header: { format: 'Studiested' } },
                  { id: 'col_5', header: { format: 'Utdanningstype' } },
                  { id: 'col_6', header: { format: 'Søkere' } },
                  { id: 'col_7', header: { format: 'Førstevalgs-<br>søkere' } },
                  { id: 'col_8', header: { format: 'Studieplasser' } }
          ],
          rendering: {
            theme: 'hcg-theme-default hcg-custom-theme'
          }
        });
      }
    }
  
      
      // ── Clear all filter inputs on page load (prevent browser restore) ──
      document.querySelectorAll('.hc-col-filter').forEach(function(inp) {
        inp.value = '';
      });

      // ── Column filtering ────────────────────────────────────────────────
      const colLabels = ["Institusjon","Studiekode","Studienavn","Studiested","Utdanningstype","Søkere","Førstevalgs- søkere","Studieplasser"];

      function getFilterValues() {
        const vals = {};
        document.querySelectorAll('.hc-col-filter').forEach(function(inp) {
          vals[inp.dataset.label] = inp.value.trim().toLowerCase();
        });
        return vals;
      }

      function applyFilters(rows) {
        const filters = getFilterValues();
        return rows.filter(function(row) {
          return colLabels.every(function(lbl) {
            const fv = filters[lbl];
            if (!fv) return true;
            const cell = String(row[lbl] == null ? '' : row[lbl]).toLowerCase();
            return cell.includes(fv);
          });
        });
      }

      document.querySelectorAll('.hc-col-filter').forEach(function(inp) {
        inp.addEventListener('input', function() {
          const key = 'default';
          renderTable(key);
        });
      });
    
      renderTable('default');
      
      const exportColLabels = ["Institusjon","Studiekode","Studienavn","Studiested","Utdanningstype","Søkere","Førstevalgs- søkere","Studieplasser"];

      function sanitizeFilePart(x) {
        return String(x).trim()
          .replace(/[\\/:*?"<>|]+/g, '-')
          .replace(/\s+/g, '_');
      }

      function fileNameForExport(ext) {
        if (false) {
          return 'grunndata_' + sanitizeFilePart(document.getElementById('grp-select').value) + '.' + ext;
        }
        return 'grunndata.' + ext;
      }

      function getCurrentVisibleRows() {
        const key = false ? document.getElementById('grp-select').value : 'default';
        const rawRows = allData[key] || [];
        return (typeof applyFilters === 'function') ? applyFilters(rawRows) : rawRows;
      }

      function downloadXLSX() {
        const rows = getCurrentVisibleRows();
        const aoa = [
          exportColLabels,
          ...rows.map(r => exportColLabels.map(lbl => r[lbl]))
        ];
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Tabell');
        XLSX.writeFile(wb, fileNameForExport('xlsx'));
      }

      const exportBtn     = document.getElementById('hc-export-btn');
      const exportMenu    = document.getElementById('hc-export-menu');
      const exportXlsxBtn = document.getElementById('hc-export-xlsx');

      exportBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        exportMenu.classList.toggle('open');
      });
      exportXlsxBtn.addEventListener('click', function() {
        downloadXLSX();
        exportMenu.classList.remove('open');
      });
      document.addEventListener('click', function(e) {
        if (!document.getElementById('hc-export-btn').contains(e.target) &&
            !document.getElementById('hc-export-menu').contains(e.target)) {
          exportMenu.classList.remove('open');
        }
      });
    
    </script>
