  const xTitle  = "";
  const yTitle  = "";
  const yMin    = 0;
  
  const select = document.getElementById("hc-omr-select");
  let chart = null;

  allData.forEach(function(d, i) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = d.label;
    select.appendChild(opt);
  });

  function fmtNum(val) { return Highcharts.numberFormat(val, 0, ",", "\u00a0"); }

  function renderChart(index) {
    const d = allData[index];
    if (chart) { chart.destroy(); }
    chart = Highcharts.chart("hc-chart-container", {
      chart:    { reflow: true, margin: [50, 20, 60, 80] },
      title:    { text: "" },
      subtitle: { text: "" },
      xAxis: {
        categories: d.categories,
        title: { text: xTitle }
      },
      yAxis: {
        min: yMin,
        title: { text: yTitle },
        labels: { formatter: function() { var val = this.value; return fmtNum(val); } }
      },
      legend: {
        enabled: true,
        align: "center",
        verticalAlign: "bottom",
        layout: "horizontal",
        itemStyle: { fontSize: "11px", fontWeight: "normal" }
      },
      tooltip: {
        shared: true,
        formatter: function() {
          var s = "<b>" + this.x + "</b>";
          this.points.forEach(function(p) {
            var val = p.y;
            s += "<br/>" + p.series.name + ": " + fmtNum(val);
          });
          return s;
        }
      },
      plotOptions: {
        line:   { lineWidth: 1.5, marker: { enabled: true, radius: 4 } },
        column: { grouping: true },
        bar:    { grouping: true }
      },
      series:  d.series,
      credits: { enabled: false },
      exporting: { enabled: true }
    });
  }

  select.addEventListener("change", function() {
    renderChart(parseInt(this.value));
  });

  renderChart(0);
})();
