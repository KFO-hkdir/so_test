<body>
<style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; font-size: 13px;
             background: #fff; padding: 10px; }
      #controls { margin-bottom: 12px; }
      #controls label { font-weight: bold; margin-right: 8px; }
      #grp-select { padding: 5px 10px; font-size: 13px; border: 1px solid #ccc;
                    border-radius: 4px; min-width: 220px; cursor: pointer; }
      #chart-container { width: 100%; height: 450px; }
    </style>
<div id="controls">
  <label for="grp-select">Vis:</label>
  <select id="grp-select"></select>
</div>
<div id="chart-container"></div>
<script>
      const allData       = [{"label":"Førstevalgssøkere","categories":["2020","2021","2022","2023","2024","2025"],"Stedbasert":[5376,6408,5400,5577,6115,5100],"lbl_Stedbasert":["5 376 (57,7 %)","6 408 (50,0 %)","5 400 (44,1 %)","5 577 (41,5 %)","6 115 (38,8 %)","5 100 (33,6 %)"],"Nettbasert eller samlingsbasert":[3943,6398,6846,7876,9627,10096],"lbl_Nettbasert eller samlingsbasert":["3 943 (42,3 %)","6 398 (50,0 %)","6 846 (55,9 %)","7 876 (58,5 %)","9 627 (61,2 %)","10 096 (66,4 %)"]},{"label":"Planlagte studieplasser","categories":["2020","2021","2022","2023","2024","2025"],"Stedbasert":[4885,6612,5068,4517,4183,3388],"lbl_Stedbasert":["4 885 (55,4 %)","6 612 (50,6 %)","5 068 (41,6 %)","4 517 (35,3 %)","4 183 (29,3 %)","3 388 (25,3 %)"],"Nettbasert eller samlingsbasert":[3932,6449,7118,8269,10104,9981],"lbl_Nettbasert eller samlingsbasert":["3 932 (44,6 %)","6 449 (49,4 %)","7 118 (58,4 %)","8 269 (64,7 %)","10 104 (70,7 %)","9 981 (74,7 %)"]}];
      const CHART_TYPE    = "column";
      const CHART_HEIGHT  = 450;
      const BAR_WIDTH     = 40;
      const FONT_SIZE     = "10px";
      const THRESHOLD     = 8;
      const CAT_LABEL     = "År";
      const STACK_LABEL   = "Kategori";

      const select = document.getElementById("grp-select");
      let chart = null;

      allData.forEach(function(d, i) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = d.label;
        select.appendChild(opt);
      });

      function renderChart(index) {
        const d = allData[index];
        if (!d) return;
        if (chart) { chart.destroy(); }

        chart = Highcharts.chart("chart-container", {
          chart: { type: CHART_TYPE, height: CHART_HEIGHT, reflow: true },
          title: { text: "" },
          xAxis: {
            categories: d.categories,
            title: { text: "" },
            labels: {
              rotation: (CHART_TYPE === "column" && d.categories.length > 6) ? -35 : 0,
              style: { fontSize: "11px" }
            }
          },
          yAxis: {
            min: 0, max: 100,
            title: { text: "" },
            labels: { format: "{value}%" },
            reversedStacks: false
          },
          tooltip: {
            useHTML: true,
            formatter: function() {
              var idx = this.point.index;
              var lbl = this.series.userOptions.labels[idx];
              return CAT_LABEL + ": " + this.x +
                     "<br>" + STACK_LABEL + ": " + this.series.name +
                     "<br>Antall / andel: " + lbl;
            }
          },
          plotOptions: {
            series: {
              stacking: "percent",
              borderWidth: 0,
              pointWidth: BAR_WIDTH,
              dataLabels: {
                enabled: true,
                crop: false,
                overflow: "none",
                style: {
                  color: "white",
                  fontWeight: "normal",
                  textOutline: "none",
                  fontSize: FONT_SIZE
                },
                formatter: function() {
                  if (this.percentage < THRESHOLD) return null;
                  return Highcharts.numberFormat(this.percentage, 1, ",", " ") + " %";
                }
              }
            }
          },
          legend: {
            layout: "horizontal", align: "center", verticalAlign: "bottom",
            itemStyle: { fontSize: "11px", fontWeight: "normal" }
          },
          series: [
          { name: "Stedbasert", data: d["Stedbasert"], labels: d["lbl_Stedbasert"], color: "#0025A0" },
          { name: "Nettbasert eller samlingsbasert", data: d["Nettbasert eller samlingsbasert"], labels: d["lbl_Nettbasert eller samlingsbasert"], color: "#E72F72" }
          ],
          credits: { enabled: false },
          exporting: { enabled: true }
        });
      }

      select.addEventListener("change", function() {
        renderChart(parseInt(this.value));
      });

      renderChart(0);
    </script>
</body>
</html>
